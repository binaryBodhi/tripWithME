services:
  # Backend Web Service
  - type: web
    name: trip-with-me-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: ./backend/start.sh
    envVars:
      - key: MONGODB_URL
        sync: false # Set this in the Render Dashboard under "Environment"
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: FRONTEND_URL
        sync: false # Set this to your frontend URL once deployed (e.g., https://trip-with-me-ui.onrender.com)

  # Frontend Static Site
  - type: web
    name: trip-with-me-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false # Set this to your backend URL once deployed (e.g., https://trip-with-me-api.onrender.com)
